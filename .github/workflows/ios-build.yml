name: iOS Build for Sideloading (Sideloadly / AltStore)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS App (.ipa)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Setup CocoaPods cache
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App (.app)
        run: |
          cd ios
          xcodebuild -workspace posvenda.xcworkspace \
                     -scheme posvenda \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO

      - name: Package Payload and create .ipa
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/posvenda.app Payload/
          zip -r posvenda.ipa Payload
          rm -rf Payload

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: posvenda-ios-release
          path: posvenda.ipa
          retention-days: 7